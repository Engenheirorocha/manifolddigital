<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RefriTech Matrix Pro - Sistema Integrado</title>
<style>
    /* ESTILIZAÇÃO COMPLETA - DESIGN PREMIUM EM MATRIZ ESCURA */
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Courier New', Courier, monospace; }
    body { background:#0d0d0f; color:#a5a5b4; padding:15px; display:flex; justify-content:center; align-items:flex-start; min-height:100vh; }
    
    .dispositivo-moldura { width:100%; max-width:460px; background:linear-gradient(145deg,#16161a,#1f1f24); border-radius:24px; padding:15px; border:3px solid #2d2d35; box-shadow:0 15px 35px rgba(0,0,0,0.7); }
    
    header { background:#0b0b0d; border:1px solid #222; border-radius:10px; padding:10px; margin-bottom:15px; text-align:center; }
    header h1 { color:#00ff66; font-size:20px; letter-spacing:2px; text-shadow:0 0 10px rgba(0,255,102,0.3); }
    header p { font-size:10px; color:#5a5a66; margin-top:4px; }
    
    /* ENGENHARIA DE ABAS */
    .abas-sistema { display:flex; gap:8px; margin-bottom:15px; }
    .aba-link { flex:1; padding:10px; border:none; background:#111114; color:#5a5a66; border-radius:6px; border:1px solid #222; cursor:pointer; font-weight:bold; font-size:11px; transition:all 0.2s ease; }
    .aba-link.selecionada { background:#1c1c22; color:#00ff66; border-color:#00ff66; box-shadow:inset 0 0 8px rgba(0,255,102,0.1); }
    
    .painel-grafico { display:none; }
    .painel-grafico.ativo { display:block; }
    
    /* PREVIEW DA IMAGEM ESCANEADA */
    .container-preview { width:100%; height:160px; background:#000; border-radius:12px; border:2px solid #333; margin-bottom:15px; overflow:hidden; position:relative; display:none; justify-content:center; align-items:center; }
    .container-preview.visivel { display:flex; }
    img { width:100%; height:100%; object-fit:cover; }
    .indicador-fps { position:absolute; top:8px; left:8px; background:rgba(0,0,0,0.8); color:#00ff66; font-size:8px; padding:3px 6px; border-radius:4px; border:1px solid #222; font-weight:bold; }
    
    /* PAINEL DIGITAL BRILHANTE (INSPIRADO EM HARDWARE REAL) */
    .tela-cristal-liquido { background:#050507; border-radius:14px; padding:20px 10px; border:2px solid #1c1c22; box-shadow:inset 0 0 20px rgba(0,0,0,1); margin-bottom:15px; }
    .bloco-medidores { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:20px; }
    .relogio-digital { width:145px; height:145px; background:#09090c; border-radius:50%; border:4px solid #16161d; display:flex; flex-direction:column; justify-content:center; align-items:center; }
    .relogio-digital.azul { border-top-color:#00d2ff; border-right-color:#00d2ff; box-shadow:0 0 15px rgba(0,210,255,0.2); }
    .relogio-digital.vermelho { border-top-color:#ff3300; border-left-color:#ff3300; box-shadow:0 0 15px rgba(255,51,0,0.2); }
    
    .label { font-size:9px; color:#5a5a66; margin-bottom:5px; font-weight:bold; }
    .valor { font-size:26px; font-weight:bold; font-family:sans-serif; }
    .azul .valor { color:#00d2ff; text-shadow:0 0 10px rgba(0,210,255,0.4); }
    .vermelho .valor { color:#ff3300; text-shadow:0 0 10px rgba(255,51,0,0.4); }
    .unidade { font-size:10px; color:#5a5a66; }
    
    .status-central { flex:1; text-align:center; }
    .gas-tag { display:inline-block; padding:4px 8px; background:#1c1c22; border:1px solid #333; border-radius:4px; color:#fff; font-size:10px; margin-bottom:8px; }
    .alerta-luz { font-size:11px; font-weight:bold; line-height:1.3; color:#5a5a66; }
    
    /* MICRO DISPLAYS - VARIÁVEIS TÉRMICAS */
    .grade-dados { display:flex; gap:8px; justify-content:space-between; background:#09090b; border:1px solid #16161d; border-radius:8px; padding:10px; }
    .quadro-info { flex:1; text-align:center; }
    .sub { display:block; font-size:9px; color:#5a5a66; margin-bottom:4px; }
    .num { font-size:13px; color:#fff; font-weight:bold; }
    .num.destaque { color:#00ff66; text-shadow:0 0 6px rgba(0,255,102,0.3); }
    
    /* FORMULÁRIO E ENTRADAS */
    .controle-grupo { margin-top:15px; }
    .controle-grupo label { display:block; margin-bottom:5px; font-size:11px; color:#5a5a66; font-weight:bold; }
    .controle-grupo input, .controle-grupo select { width:100%; padding:10px; background:#111114; border:1px solid #222; border-radius:6px; color:#fff; font-size:14px; outline:none; }
    .controle-grupo input:focus, .controle-grupo select:focus { border-color:#00ff66; }
    
    /* BOTÕES DE CAMPO */
    .acao-gatilho { width:100%; margin-top:15px; padding:14px; border:none; border-radius:8px; cursor:pointer; font-size:14px; font-weight:bold; text-transform:uppercase; background:linear-gradient(180deg,#00ff66,#00cc52); color:#000; box-shadow:0 4px 15px rgba(0, 255, 102, 0.2); }
    .acao-foto { width:100%; margin-top:8px; padding:10px; border-radius:6px; border:1px solid #222; background:#16161d; color:#a5a5b4; cursor:pointer; font-weight:bold; text-transform:uppercase; font-size:11px; display:block; text-align:center; }
    
    /* DIAGNÓSTICOS */
    .painel-diagnostico-final { margin-top:15px; padding:12px; background:#0f0f12; border:1px solid #222; border-radius:10px; display:none; }
    .painel-diagnostico-final.ativo { display:block; }
    .diag-header { font-size:12px; font-weight:bold; margin-bottom:6px; }
    .diag-desc { font-size:11px; line-height:1.5; color:#848494; font-family:sans-serif; }
    
    /* ANIMAÇÕES NEON DE PULSO */
    @keyframes pulseGreen { 0% { text-shadow: 0 0 5px #00ff66; color: #00ff66; } 50% { text-shadow: 0 0 20px #00ff66; color: #00ffaa; } 100% { text-shadow: 0 0 5px #00ff66; color: #00ff66; } }
    @keyframes pulseRed { 0% { text-shadow: 0 0 5px #ff3300; color: #ff3300; } 50% { text-shadow: 0 0 20px #ff3300; color: #ff6633; } 100% { text-shadow: 0 0 5px #ff3300; color: #ff3300; } }
    @keyframes pulseYellow { 0% { text-shadow: 0 0 5px #ffea00; color: #ffea00; } 50% { text-shadow: 0 0 20px #ffea00; color: #ffff33; } 100% { text-shadow: 0 0 5px #ffea00; color: #ffea00; } }
    .estavel { animation: pulseGreen 1.5s infinite; }
    .critico { animation: pulseRed 1s infinite; }
    .atencao { animation: pulseYellow 1.5s infinite; }
</style>
</head>
<body>

<div class="dispositivo-moldura">
    <header>
        <h1>REFRI-MATRIX PRO</h1>
        <p>SISTEMA ESPECIALISTA UNIFICADO</p>
    </header>

    <div class="abas-sistema">
        <button id="tab-man" class="aba-link selecionada" onclick="trocarVisualAba('manifold')">DISPLAY</button>
        <button id="tab-err" class="aba-link" onclick="trocarVisualAba('erros')">MÁQUINAS / ERROS</button>
    </div>
    
    <!-- ABA 1: DISPLAY DO MANIFOLD -->
    <div id="painel-man" class="painel-grafico ativo">
        
        <!-- ÁREA QUE MOSTRA A FOTO CAPTURADA -->
        <div class="container-preview" id="area-preview">
            <div class="indicador-fps">IMAGEM PROCESSADA</div>
            <img id="imagem-preview" src="" alt="Preview">
        </div>

        <div class="tela-cristal-liquido">
            <div class="bloco-medidores">
                <div class="relogio-digital azul">
                    <div class="label">PRESSÃO</div>
                    <div class="valor" id="val-p">00.0</div>
                    <div class="unidade">PSI</div>
                </div>
                <div class="status-central">
                    <div class="gas-tag" id="tag-gas-tela">R410A</div>
                    <div class="alerta-luz" id="txt-status-luz">STANDBY<br>---</div>
                </div>
                <div class="relogio-digital vermelho">
                    <div class="label">ALVO TUBO</div>
                    <div class="valor" id="val-alvo">--.-</div>
                    <div class="unidade">°C</div>
                </div>
            </div>
            <div class="grade-dados">
                <div class="quadro-info"><span class="sub">V-SAT</span><span class="num" id="d-vsat">--.-°C</span></div>
                <div class="quadro-info"><span class="sub">EVAP</span><span class="num" id="d-evap">--.-°C</span></div>
                <div class="quadro-info"><span class="sub">SH REAL</span><span class="num destaque" id="d-sh">--.-°C</span></div>
            </div>
        </div>

        <div class="controle-grupo">
            <label>Fluido Refrigerante</label>
            <select id="op-gas" onchange="atualizarGas()">
                <option value="R410A">R410A</option>
                <option value="R22">R22</option>
                <option value="R32">R32</option>
            </select>
        </div>
        <div class="controle-grupo" id="box-p-manual">
            <label>Pressão Real ou Teórica (PSI)</label>
            <input type="number" id="op-pressao" value="120">
        </div>
        <div class="controle-grupo">
            <label>Termômetro de R$15 no Tubo (°C)</label>
            <input type="number" id="op-temp" value="10">
        </div>

        <button class="acao-gatilho" onclick="processarMotorTermodinamico()">ANALISAR VARIÁVEIS</button>
        
        <!-- ESTE BOTÃO AGORA CHAMA A CÂMERA DO CELULAR EM QUALQUER LUGAR (FOTO) -->
        <label for="camera-input" class="acao-foto">📷 ESCANEAR APARELHOS</label>
        <input type="file" accept="image/*" capture="environment" id="camera-input" style="display:none;" onchange="processarFotoCapturada(event)">

        <div id="painel-diagnostico" class="painel-diagnostico-final">
            <div class="diag-header" id="diag-tit">---</div>
            <div class="diag-desc" id="diag-txt">---</div>
        </div>
    </div>

    <!-- ABA 2: PESQUISA DE CÓDIGOS DE ERRO OFFLINE -->
    <div id="painel-err" class="painel-grafico">
        <div class="controle-grupo">
            <label>Buscar Sintoma ou Código de Placa</label>
            <input type="text" id="campo-busca-erro" placeholder="Ex: Carrier E3, Midea EC, LG CH05...">
        </div>
        <button class="acao-gatilho" style="background:linear-gradient(180deg,#00b0ff,#0091ea); color:#fff;" onclick="pesquisarErroNoBanco()">PESQUISAR BANCO OFFLINE</button>
    </div>
</div>

<script>
    // BANCO DE ERROS INTEGRADO OFFLINE (MARCAS FAMOSAS)
    const BANCO_DE_ERROS = [
        { marca: "midea", codigo: "ec", defeito: "Falta de gás ou falha no sensor", solucao: "1. Verifique a pressão de trabalho na aba DISPLAY;\n2. Inspecione vazamentos nas flanges;\n3. Teste o sensor de degelo (10k ohms)." },
        { marca: "midea", codigo: "e1", defeito: "Erro de comunicação serial", solucao: "1. Verifique os cabos nos bornes 1, 2 e 3;\n2. Teste a oscilação de tensão DC de sinal;\n3. Certifique-se de que a condensadora está alimentada." },
        { marca: "samsung", codigo: "e101", defeito: "Erro de comunicação (timeout)", solucao: "1. Desligue o disjuntor por 5 minutes para resetar a memória;\n2. Inspecione fiação F1/F2;\n3. Veja os LEDs de diagnóstico da placa externa." },
        { marca: "lg", codigo: "ch05", defeito: "Falha de comunicação serial Inverter", solucao: "1. Use limpa-contatos nos bornes elétricos;\n2. Verifique se o cabo possui emendas ou quebras;\n3. Exige aterramento independente correto nas duas unidades." }
    ];

    // SISTEMA DE TROCA DE ABAS
    function trocarVisualAba(nomeAba) {
        document.querySelectorAll('.painel-grafico').forEach(p => p.classList.remove('ativo'));
        document.getElementById('tab-man').classList.remove('selecionada');
        document.getElementById('tab-err').classList.remove('selecionada');
        if(nomeAba === 'manifold') {
            document.getElementById('painel-man').classList.add('ativo');
            document.getElementById('tab-man').classList.add('selecionada');
        } else {
            document.getElementById('painel-err').classList.add('ativo');
            document.getElementById('tab-err').classList.add('selecionada');
        }
    }

    function atualizarGas() {
        document.getElementById('tag-gas-tela').innerText = document.getElementById('op-gas').value;
    }

    // DISPARADOR DA CÂMERA DO NAVEGADOR
    function processarFotoCapturada(event) {
        const arquivo = event.target.files[0];
        if (arquivo) {
            const reader = new FileReader();
            reader.onload = function(e) {
                // Mostra o preview da foto tirada no topo do painel
                document.getElementById('imagem-preview').src = e.target.result;
                document.getElementById('area-preview').classList.add('visivel');
                
                // SIMULAÇÃO DA LEITURA DA FOTO PELA NOSSA IA
                let pressaoSimulada PelaIA = 115 + Math.floor(Math.random() * 15);
                document.getElementById('op-pressao').value = pressaoSimuladaPelaIA;
                
                // Roda o motor matemático de diagnóstico
                processarMotorTermodinamico();
            };
            reader.readAsDataURL(arquivo);
        }
    }

    // BUSCA DE ERROS COM TRAVA ANTI-CÓPIA INTEGRADA
    function pesquisarErroNoBanco() {
        let termoBusca = document.getElementById('campo-busca-erro').value.toLowerCase().trim();
        let container = document.getElementById('painel-err');
        let antigo = document.getElementById('box-resultado-erro');
        if (antigo) antigo.remove();
        if (termoBusca === "") { alert("Digite um termo para pesquisar!"); return; }

        let erro = BANCO_DE_ERROS.find(item => termoBusca.includes(item.marca) || termoBusca.includes(item.codigo) || (item.marca + " " + item.codigo).includes(termoBusca));
        let box = document.createElement('div');
        box.id = 'box-resultado-erro';
        box.style.cssText = "margin-top:20px; padding:15px; background:#0f0f12; border:1px solid #222; border-radius:10px; user-select:none; -webkit-user-select:none; -moz-user-select:none; -ms-user-select:none;";

        if (erro) {
            box.style.borderLeft = "4px solid #00b0ff";
            box.innerHTML = `<div style='color:#00b0ff; font-weight:bold; font-size:12px;'>${erro.marca.toUpperCase()} - ${erro.codigo.toUpperCase()}</div><div style='color:#fff; font-size:12px; margin:5px 0;'>Defeito: ${erro.defeito}</div><div style='font-size:11px; white-space:pre-line; color:#a5a5b4;'>${erro.solucao}</div>`;
        } else {
            box.style.borderLeft = "4px solid #ff3300";
            box.innerHTML = `<div style='color:#ff3300; font-weight:bold;'>CÓDIGO NÃO LOCALIZADO</div><div style='font-size:11px; margin-top:5px;'>Verifique os parâmetros de alimentação elétrica e integridade dos sensores NTC.</div>`;
        }
        container.appendChild(box);
    }

    // MOTOR TERMODINÂMICO - REGRAS DO SISTEMA ESPECIALISTA
    function processarMotorTermodinamico() {
        let pReal = parseFloat(document.getElementById('op-pressao').value);
        let tReal = parseFloat(document.getElementById('op-temp').value);
        let gas = document.getElementById('op-gas').value;
        if (isNaN(pReal) || isNaN(tReal)) return;

        let vSat = 4.0;
        if (gas === "R410A") {
            if (pReal < 110) vSat = -2.0;
            else if (pReal >= 110 && pReal < 120) vSat = 1.5;
            else if (pReal >= 120 && pReal < 135) vSat = 4.0;
            else vSat = 10.0;
        } else if (gas === "R22") {
            vSat = pReal < 70 ? 1.0 : 5.0;
        } else if (gas === "R32") {
            vSat = pReal < 115 ? -3.0 : 3.5;
        }

        let sh = tReal - vSat;
        let alvoTubo = vSat + 7;

        document.getElementById('val-p').innerText = pReal.toFixed(1);
        document.getElementById('val-alvo').innerText = alvoTubo.toFixed(1);
        document.getElementById('d-vsat').innerText = vSat.toFixed(1) + "°C";
        document.getElementById('d-evap').innerText = tReal.toFixed(1) + "°C";
        document.getElementById('d-sh').innerText = sh.toFixed(1) + "°C";

        let pDiag = document.getElementById('painel-diagnostico');
        let dTit = document.getElementById('diag-tit');
        let dTxt = document.getElementById('diag-txt');
        let lStatus = document.getElementById('txt-status-luz');

        pDiag.classList.add('ativo');
        lStatus.className = "alerta-luz";

        if (pReal > 145) {
            pDiag.style.borderLeft = "4px solid #ff3300"; dTit.style.color = "#ff3300"; lStatus.classList.add('critico');
            lStatus.innerHTML = "CRÍTICO<br>ALTA PRESSÃO"; dTit.innerText = "ALERTA: DISPERSÃO TÉRMICA BLOQUEADA";
            dTxt.innerText = "A pressão de trabalho está excessiva. Avalie: CONDENSADOR SUJO / OBSTRUÍDO ou baixa ventilação na unidade externa.";
        } else if (pReal < 100) {
            pDiag.style.borderLeft = "4px solid #ff3300"; dTit.style.color = "#ff3300"; lStatus.classList.add('critico');
            lStatus.innerHTML = "CRÍTICO<br>BAIXA PRESSÃO";
            dTit.innerText = sh > 11 ? "ALERTA: DEFASAGEM DE FLUIDO REFRIGERANTE" : "ALERTA: BLOQUEIO DE TROCA EVAPORADORA";
            dTxt.innerText = sh > 11 ? "Sintoma de vazamento de gás. Procure marcas de óleo nas flanges e conexões." : "O frio não está saindo. Verifique se os filtros de ar internos estão obstruídos de sujeira.";
        } else {
            if (sh >= 5 && sh <= 11) {
                pDiag.style.borderLeft = "4px solid #00ff66"; dTit.style.color = "#00ff66"; lStatus.classList.add('estavel');
                lStatus.innerHTML = "SISTEMA<br>ESTÁVEL"; dTit.innerText = "EQUIPAMENTO OPERANDO EM PARÂMETRO IDEAL";
                dTxt.innerText = "Superaquecimento perfeito em " + sh.toFixed(1) + "°C. Sistema operando em máxima eficiência de catálogo.";
            } else {
                pDiag.style.borderLeft = "4px solid #ffea00"; dTit.style.color = "#ffea00"; lStatus.classList.add('atencao');
                lStatus.innerHTML = "ATENÇÃO<br>FORA DO SH"; dTit.innerText = "AJUSTE DE SEGURANÇA EXIGIDO";
                dTxt.innerText = sh < 5 ? "Risco imediato de GOLPE DE LÍQUIDO quebrar o compressor." : "Falta fluido para refrigerar o motor elétrico da bobina.";
            }
        }
    }
</script>
</body>
</html>
