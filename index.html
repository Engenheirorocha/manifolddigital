<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HVAC PRO</title>

<style>
*{box-sizing:border-box}
html, body{margin:0;width:100%;height:100%;font-family:Arial,sans-serif;background:radial-gradient(circle at top,#1b1b1b,#050505 55%,#000);color:#fff;overflow:hidden}
.app{max-width:430px;margin:auto;height:100dvh;padding:22px;display:flex;flex-direction:column;justify-content:center;animation:entry 1s ease forwards;overflow:hidden}
@keyframes entry{from{opacity:0;transform:scale(.94) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.logo{text-align:center;font-size:34px;font-weight:900;letter-spacing:4px;margin-bottom:45px;text-shadow:0 0 18px #008cff,0 0 35px rgba(255,40,40,.35)}
.screen{display:none}.screen.active{display:block}
.carousel-wrap{position:relative;height:365px;perspective:1100px}
.carousel{position:relative;width:100%;height:100%;touch-action:pan-y}
.card{position:absolute;top:25px;left:50%;width:195px;height:285px;margin-left:-97.5px;border-radius:32px;background:linear-gradient(145deg,#1c1c1c,#050505);border:1px solid #2d2d2d;box-shadow:0 25px 55px rgba(0,0,0,.9),inset 0 1px 0 rgba(255,255,255,.08);display:flex;flex-direction:column;justify-content:center;align-items:center;transition:transform .55s cubic-bezier(.2,.9,.2,1),opacity .4s,border .3s,box-shadow .3s;cursor:pointer}
.card.center{transform:translateX(0) scale(1) rotateY(0);opacity:1;z-index:5;border-color:#008cff;box-shadow:0 0 34px rgba(0,140,255,.42),0 25px 60px rgba(0,0,0,.95)}
.card.left{transform:translateX(-130px) scale(.74) rotateY(42deg);opacity:.45;z-index:3}
.card.right{transform:translateX(130px) scale(.74) rotateY(-42deg);opacity:.45;z-index:3}
.card.far-left{transform:translateX(-205px) scale(.48) rotateY(55deg);opacity:.16;z-index:2}
.card.far-right{transform:translateX(205px) scale(.48) rotateY(-55deg);opacity:.16;z-index:2}
.card.hidden{transform:translateX(0) scale(.35);opacity:0;z-index:1}
.icon{font-size:78px;margin-bottom:24px}
.title{font-size:21px;font-weight:900;letter-spacing:1px}
.blue{color:#009dff}.red{color:#ff3636}.orange{color:#ff8c1a}.green{color:#00d084}
.nav{display:flex;justify-content:center;gap:18px;margin-top:8px}
button{width:58px;height:58px;border-radius:50%;border:1px solid #333;background:linear-gradient(145deg,#181818,#050505);color:#fff;font-size:28px;cursor:pointer;box-shadow:0 12px 25px rgba(0,0,0,.7)}
button:active{transform:scale(.92)}
.manifold-icon,.gas-icon{width:86px;height:86px;margin-bottom:22px}

.page{max-width:430px;margin:auto;height:100dvh;padding:22px 22px 80px;animation:entry .45s ease forwards;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.back{padding:12px 15px;border-radius:16px;background:linear-gradient(145deg,#181818,#050505);border:1px solid #333;cursor:pointer;color:#fff;font-size:14px}
.page-title{font-size:26px;font-weight:900;letter-spacing:3px}
.mode-box{background:linear-gradient(145deg,#1c1c1c,#050505);border:1px solid #2d2d2d;border-radius:28px;padding:18px;box-shadow:0 22px 50px rgba(0,0,0,.85),inset 0 1px 0 rgba(255,255,255,.06)}
.mode-title{font-size:13px;color:#aaa;margin-bottom:14px}
.gas-list,.category-list,.brand-list{display:flex;gap:12px;overflow-x:auto;padding-bottom:14px;margin-bottom:18px}
.gas-chip,.error-chip{min-width:110px;height:120px;border-radius:22px;background:linear-gradient(145deg,#171717,#050505);border:1px solid #292929;display:flex;flex-direction:column;justify-content:center;align-items:center;cursor:pointer;text-align:center}
.gas-chip.active-gas{border-color:#00d084;box-shadow:0 0 24px rgba(0,208,132,.28)}
.error-chip.active-error{border-color:#ff3636;box-shadow:0 0 24px rgba(255,54,54,.28)}
.gas-chip strong,.error-chip strong{font-size:20px}
.gas-chip strong{color:#00d084}.error-chip strong{color:#ff3636}
.gas-chip small,.error-chip small{margin-top:8px;color:#888}
.search-area{margin:18px 0}
.search-area input{width:100%;padding:16px;border-radius:18px;border:1px solid #333;background:#050505;color:#fff;font-size:16px;outline:none}
.gas-info,.error-info{background:#080808;border:1px solid #252525;border-radius:22px;padding:18px;line-height:1.7}
.gas-info h2{margin:0 0 10px;color:#00d084;letter-spacing:1px}
.error-info h2{margin:0 0 10px;color:#ff3636;letter-spacing:1px}
.info-row{border-bottom:1px solid #1c1c1c;padding:8px 0}.info-row:last-child{border-bottom:0}.info-row span{color:#888;font-size:13px}
.pt-table{width:100%;border-collapse:collapse;margin-top:10px;font-size:13px}
.pt-table th,.pt-table td{border-bottom:1px solid #1c1c1c;padding:8px 4px;text-align:left}
.pt-table th{color:#00d084;font-weight:bold}.note{margin-top:12px;font-size:12px;color:#888;line-height:1.5}
</style>
</head>

<body>

<div class="app screen active" id="home">
  <div class="logo">HVAC PRO</div>

  <div class="carousel-wrap">
    <div class="carousel" id="carousel">

      <div class="card">
        <div class="manifold-icon">
          <svg viewBox="0 0 100 100" fill="none">
            <rect x="18" y="14" width="64" height="50" rx="10" stroke="#009dff" stroke-width="6"/>

        <div class="title orange">TESTES</div>
      </div>

      <div class="card" onclick="openScreen('gases')">
        <div class="gas-icon">
          <svg viewBox="0 0 100 100" fill="none">
            <rect x="32" y="18" width="36" height="58" rx="10" stroke="#00d084" stroke-width="6"/>
            <rect x="42" y="10" width="16" height="10" rx="3" fill="#00d084"/>

    </div>

  <div class="nav">
    <button onclick="prev()">‹</button>
    <button onclick="next()">›</button>
  </div>
</div>

<div class="screen page" id="gases">
  <div class="topbar">
    <div class="back" onclick="openScreen('home')">← Voltar</div>
    <div class="page-title green">GASES</div>
  </div>

  <div class="mode-box">
    <div class="mode-title">Modo interativo</div>

    <div class="gas-list">
      <div class="gas-chip active-gas" onclick="selectGas('R410A', this)"><strong>R410A</strong><small>Split</small></div>
      <div class="gas-chip" onclick="selectGas('R22', this)"><strong>R22</strong><small>Antigo</small></div>
      <div class="gas-chip" onclick="selectGas('R32', this)"><strong>R32</strong><small>A2L</small></div>
      <div class="gas-chip" onclick="selectGas('R407C', this)"><strong>R407C</strong><small>Split/Chiller</small></div>
      <div class="gas-chip" onclick="selectGas('R134A', this)"><strong>R134a</strong><small>Leve</small></div>
      <div class="gas-chip" onclick="selectGas('R404A', this)"><strong>R404A</strong><small>Comercial</small></div>
      <div class="gas-chip" onclick="selectGas('R507A', this)"><strong>R507A</strong><small>Freezer</small></div>
      <div class="gas-chip" onclick="selectGas('R448A', this)"><strong>R448A</strong><small>Baixo GWP</small></div>
      <div class="gas-chip" onclick="selectGas('R449A', this)"><strong>R449A</strong><small>Retrofit</small></div>
      <div class="gas-chip" onclick="selectGas('R600A', this)"><strong>R600a</strong><small>Geladeira</small></div>
      <div class="gas-chip" onclick="selectGas('R290', this)"><strong>R290</strong><small>Propano</small></div>

    <div class="mode-title">Modo manual</div>
    <div class="search-area">
      <input id="gasSearch" type="text" placeholder="Digite o gás: R410A, R22, R404A..." oninput="searchGas()">
    </div>

    <div class="gas-info" id="gasInfo"></div>
  </div>
</div>

<div class="screen page" id="erros">
  <div class="topbar">
    <div class="back" onclick="openScreen('home')">← Voltar</div>
    <div class="page-title red">ERROS</div>
  </div>

  <div class="mode-box">

    <div class="mode-title">1. Categoria</div>
    <div class="category-list" id="categoryList"></div>

    <div class="mode-title">2. Marca</div>
    <div class="brand-list" id="brandList"></div>

    <div class="mode-title">3. Código / Defeito</div>
    <div class="search-area">
      <input id="errorSearch" type="text" placeholder="Digite: E1, CH05, U4..." oninput="searchError()">
    </div>

    <div class="error-info" id="errorInfo"></div>

  </div>
</div>

<script>
const cards=document.querySelectorAll('.card');
let current=0,startX=0,endX=0;
let activeCategory="Split";
let activeBrand="Midea";

function updateCarousel(){
  cards.forEach((card,index)=>{
    card.className='card';
    const left=(current-1+cards.length)%cards.length;
    const right=(current+1)%cards.length;
    const farLeft=(current-2+cards.length)%cards.length;
    const farRight=(current+2)%cards.length;

    if(index===current) card.classList.add('center');
    else if(index===left) card.classList.add('left');
    else if(index===right) card.classList.add('right');
    else if(index===farLeft) card.classList.add('far-left');
    else if(index===farRight) card.classList.add('far-right');
    else card.classList.add('hidden');
  });
}

function next(){current=(current+1)%cards.length;updateCarousel()}
function prev(){current=(current-1+cards.length)%cards.length;updateCarousel()}

const carousel=document.getElementById('carousel');
carousel.addEventListener('touchstart',e=>{startX=e.touches[0].clientX});
carousel.addEventListener('touchend',e=>{
  endX=e.changedTouches[0].clientX;
  const diff=endX-startX;
  if(diff>45) prev();
  if(diff<-45) next();
});

function openScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  if(id==='gases') document.getElementById('gases').scrollTop=0;

  if(id==='erros'){
    document.getElementById('erros').scrollTop=0;
    renderCategories();
    renderBrands();
    renderFirstError();
  }
}

function renderGas(name){
  const key=name.toUpperCase();
  const gas=gasData[key];

  if(!gas){
    document.getElementById('gasInfo').innerHTML=`<h2>Não encontrado</h2><div class="info-row">Digite um gás válido.</div>`;
    return;
  }

  const ptRows=gas.pt.map(row=>`<tr><td>${row[0]}</td><td>${row[1]}</td></tr>`).join("");

  document.getElementById('gasInfo').innerHTML=`
    <h2>${gas.nome}</h2>
    <div class="info-row"><span>Tipo:</span><br>${gas.tipo}</div>
    <div class="info-row"><span>Composição:</span><br>${gas.composicao}</div>
    <div class="info-row"><span>Aplicação:</span><br>${gas.aplicacao}</div>
    <div class="info-row"><span>Óleo:</span><br>${gas.oleo}</div>
    <div class="info-row"><span>Segurança:</span><br>${gas.seguranca}</div>
    <div class="info-row"><span>GWP:</span><br>${gas.gwp}</div>
    <div class="info-row"><span>ODP:</span><br>${gas.odp}</div>
    <div class="info-row"><span>Ebulição:</span><br>${gas.ebulição}</div>
    <div class="info-row"><span>Crítica:</span><br>${gas.critica}</div>
    <div class="info-row"><span>Pressão crítica:</span><br>${gas.pressaoCritica}</div>
    <div class="info-row"><span>Glide:</span><br>${gas.glide}</div>
    <div class="info-row"><span>Transferência:</span><br>${gas.transferencia}</div>
    <div class="info-row"><span>Evaporação típica:</span><br>${gas.faixaEvaporacao}</div>
    <div class="info-row"><span>Condensação típica:</span><br>${gas.faixaCondensacao}</div>
    <div class="info-row"><span>Campo:</span><br>${gas.campo}</div>
    <div class="info-row"><span>Tabela PT resumida:</span>
      <table class="pt-table"><thead><tr><th>Temp.</th><th>Pressão</th></tr></thead><tbody>${ptRows}</tbody></table>
      <div class="note">Valores aproximados para referência rápida. Conferir tabela oficial para ajuste fino.</div>
    </div>`;
}

function selectGas(name,el){
  document.querySelectorAll('.gas-chip').forEach(chip=>chip.classList.remove('active-gas'));
  el.classList.add('active-gas');
  document.getElementById('gasSearch').value=name;
  renderGas(name);
}

function searchGas(){
  const value=document.getElementById('gasSearch').value.trim();
  if(value.length>=2) renderGas(value);
}

function renderCategories(){
  const box=document.getElementById('categoryList');
  box.innerHTML=Object.keys(errorData).map(cat=>`
    <div class="error-chip ${cat===activeCategory?'active-error':''}" onclick="selectCategory('${cat}')">
      <strong>${cat}</strong>
      <small>categoria</small>
    </div>
  `).join("");
}

function renderBrands(){
  const box=document.getElementById('brandList');
  box.innerHTML=Object.keys(errorData[activeCategory]).map(brand=>`
    <div class="error-chip ${brand===activeBrand?'active-error':''}" onclick="selectBrand('${brand}')">
      <strong>${brand}</strong>
      <small>marca</small>
    </div>
  `).join("");
}

function selectCategory(cat){
  activeCategory=cat;
  activeBrand=Object.keys(errorData[cat])[0];
  renderCategories();
  renderBrands();
  renderFirstError();
}

function selectBrand(brand){
  activeBrand=brand;
  renderBrands();
  renderFirstError();
}

function renderFirstError(){
  const first=Object.keys(errorData[activeCategory][activeBrand])[0];
  renderError(first);
}

function searchError(){
  const value=document.getElementById('errorSearch').value.trim().toUpperCase();
  if(value.length>=1) renderError(value);
}

function renderError(code){
  const data=errorData[activeCategory][activeBrand][code];

  if(!data){
    document.getElementById('errorInfo').innerHTML=`
      <h2>Código não encontrado</h2>
      <div class="info-row">Esse código não está cadastrado nessa categoria e marca.</div>
    `;
    return;
  }

  document.getElementById('errorInfo').innerHTML=`
    <h2>${activeBrand} ${code}</h2>
    <div class="info-row"><span>Categoria:</span><br>${activeCategory}</div>
    <div class="info-row"><span>Marca:</span><br>${activeBrand}</div>
    <div class="info-row"><span>Falha:</span><br>${data.falha}</div>
    <div class="info-row"><span>Descrição:</span><br>${data.descricao}</div>
    <div class="info-row"><span>Causa provável:</span><br>${data.causa}</div>
    <div class="info-row"><span>Teste em campo:</span><br>${data.teste}</div>
    <div class="info-row"><span>Solução sugerida:</span><br>${data.solucao}</div>
  `;
}

updateCarousel();
renderGas("R410A");
renderCategories();
renderBrands();
renderFirstError();
</script>
