<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RefriCore IA Pro</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#070707;
  color:#fff;
}

/* topo profissional */
.header{
  padding:18px;
  background:#0d0d0d;
  border-bottom:1px solid #1f1f1f;
}

.title{
  font-size:22px;
  font-weight:bold;
}

.subtitle{
  font-size:12px;
  color:#888;
}

/* layout */
.container{
  padding:15px;
  max-width:900px;
  margin:auto;
}

.card{
  background:#111;
  border:1px solid #1f1f1f;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

input, select{
  width:100%;
  padding:10px;
  background:#000;
  color:#fff;
  border:1px solid #333;
  border-radius:8px;
  font-size:14px;
}

/* indicador estilo industrial */
.badge{
  display:inline-block;
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
  margin-top:5px;
}

.green{background:#0c2a1a;color:#00ff9d;}
.yellow{background:#2a240c;color:#ffd000;}
.red{background:#2a0c0c;color:#ff4d4d;}

/* resultado forte */
.big{
  font-size:28px;
  font-weight:bold;
}

/* alerta */
.alert{
  padding:12px;
  border-radius:10px;
  border:1px solid #333;
  background:#111;
}

</style>
</head>

<body>

<div class="header">
  <div class="title">RefriCore IA Pro</div>
  <div class="subtitle">Diagnóstico térmico inteligente HVAC</div>
</div>

<div class="container">

<!-- ENTRADA INTELIGENTE -->
<div class="card">
  <label>Gás do sistema</label>
  <select id="gas">
    <option value="R410A">R410A</option>
    <option value="R32">R32</option>
    <option value="R22">R22</option>
    <option value="R134a">R134a</option>
  </select>
</div>

<div class="grid">

  <div class="card">
    <label>Pressão Baixa (PSI)</label>
    <input id="pb" type="number" value="65" oninput="calc()">
  </div>

  <div class="card">
    <label>Temperatura Sucção (°C)</label>
    <input id="ts" type="number" value="9" oninput="calc()">
  </div>

</div>

<!-- RESULTADO INFERIDO -->
<div class="card">
  <div>Evaporação estimada</div>
  <div class="big" id="evap">--</div>
  <div id="rangeEvap"></div>
</div>

<div class="grid">

  <div class="card">
    <div>Pressão Alta estimada</div>
    <div class="big" id="pa">--</div>
    <div id="rangePA"></div>
  </div>

  <div class="card">
    <div>Superaquecimento</div>
    <div class="big" id="sh">--</div>
  </div>

</div>

<!-- DIAGNÓSTICO -->
<div class="alert" id="diag">
Aguardando leitura do sistema...
</div>

</div>

<script>

/* =========================
   BASE INTELIGENTE SIMPLES
========================= */

function inferir(gas, pb, ts){

  // EVAPORAÇÃO estimada por PSI (simplificado base HVAC)
  let evap = pb / 10;

  // PRESSÃO ALTA estimada por gás
  let fatorAlta = {
    R410A: 3.8,
    R32: 3.6,
    R22: 3.0,
    R134a: 2.8
  };

  let pa = pb * (fatorAlta[gas] || 3.2);

  // SUPERHEAT
  let sh = ts - evap;

  return {evap, pa, sh};
}

function faixa(valor, margem){
  return (valor - margem) + " ~ " + (valor + margem);
}

function calc(){

  let gas = document.getElementById("gas").value;
  let pb = Number(document.getElementById("pb").value);
  let ts = Number(document.getElementById("ts").value);

  let r = inferir(gas, pb, ts);

  // saída
  document.getElementById("evap").innerText = r.evap.toFixed(1) + "°C";
  document.getElementById("pa").innerText = r.pa.toFixed(0) + " PSI";
  document.getElementById("sh").innerText = r.sh.toFixed(1) + "K";

  document.getElementById("rangeEvap").innerText =
    "Faixa: " + faixa(r.evap, 2) + " °C";

  document.getElementById("rangePA").innerText =
    "Faixa: " + faixa(r.pa, 20) + " PSI";

  // DIAGNÓSTICO INTELIGENTE
  let msg = "";
  let cls = "";

  if(r.sh > 10){
    msg = "⚠ Possível baixa carga de gás ou restrição";
    cls = "red";
  }
  else if(r.sh < 4){
    msg = "⚠ Possível excesso de líquido no sistema";
    cls = "yellow";
  }
  else{
    msg = "✅ Sistema operando dentro da faixa normal";
    cls = "green";
  }

  let d = document.getElementById("diag");
  d.innerHTML = msg;
  d.className = "alert " + cls;

}

calc();

</script>

</body>
</html>
