<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HVAC PRO</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:radial-gradient(circle at top,#1b1b1b,#050505 55%,#000);
  color:#fff;
  min-height:100vh;
  overflow:hidden;
}

.app{
  max-width:430px;
  margin:auto;
  min-height:100vh;
  padding:22px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  animation:entry 1s ease forwards;
}

@keyframes entry{
  from{opacity:0;transform:scale(.94) translateY(20px)}
  to{opacity:1;transform:scale(1) translateY(0)}
}

.logo{
  text-align:center;
  font-size:34px;
  font-weight:900;
  letter-spacing:4px;
  margin-bottom:45px;
  text-shadow:
  0 0 18px #008cff,
  0 0 35px rgba(255,40,40,.35);
}

.screen{
  display:none;
}

.screen.active{
  display:block;
}

.carousel-wrap{
  position:relative;
  height:365px;
  perspective:1100px;
}

.carousel{
  position:relative;
  width:100%;
  height:100%;
  touch-action:pan-y;
}

.card{
  position:absolute;
  top:25px;
  left:50%;
  width:195px;
  height:285px;
  margin-left:-97.5px;

  border-radius:32px;

  background:
  linear-gradient(145deg,#1c1c1c,#050505);

  border:1px solid #2d2d2d;

  box-shadow:
  0 25px 55px rgba(0,0,0,.9),
  inset 0 1px 0 rgba(255,255,255,.08);

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;

  transition:
  transform .55s cubic-bezier(.2,.9,.2,1),
  opacity .4s,
  border .3s,
  box-shadow .3s;

  cursor:pointer;
}

.card.center{
  transform:
  translateX(0)
  scale(1)
  rotateY(0);

  opacity:1;
  z-index:5;

  border-color:#008cff;

  box-shadow:
  0 0 34px rgba(0,140,255,.42),
  0 25px 60px rgba(0,0,0,.95);
}

.card.left{
  transform:
  translateX(-130px)
  scale(.74)
  rotateY(42deg);

  opacity:.45;
  z-index:3;
}

.card.right{
  transform:
  translateX(130px)
  scale(.74)
  rotateY(-42deg);

  opacity:.45;
  z-index:3;
}

.card.far-left{
  transform:
  translateX(-205px)
  scale(.48)
  rotateY(55deg);

  opacity:.16;
  z-index:2;
}

.card.far-right{
  transform:
  translateX(205px)
  scale(.48)
  rotateY(-55deg);

  opacity:.16;
  z-index:2;
}

.card.hidden{
  transform:translateX(0) scale(.35);
  opacity:0;
  z-index:1;
}

.icon{
  font-size:78px;
  margin-bottom:24px;
}

.title{
  font-size:21px;
  font-weight:900;
  letter-spacing:1px;
}

.blue{color:#009dff}
.red{color:#ff3636}
.orange{color:#ff8c1a}
.green{color:#00d084}

.nav{
  display:flex;
  justify-content:center;
  gap:18px;
  margin-top:8px;
}

button{
  width:58px;
  height:58px;
  border-radius:50%;
  border:1px solid #333;

  background:
  linear-gradient(145deg,#181818,#050505);

  color:#fff;
  font-size:28px;

  cursor:pointer;

  box-shadow:
  0 12px 25px rgba(0,0,0,.7);
}

button:active{
  transform:scale(.92);
}

.manifold-icon{
  width:86px;
  height:86px;
  margin-bottom:22px;
}
</style>
</head>

<body>

<div class="app screen active" id="home">

  <div class="logo">HVAC PRO</div>

  <div class="carousel-wrap">

    <div class="carousel" id="carousel">

      <!-- MANIFOLD -->
      <div class="card">

        <div class="manifold-icon">

          <svg viewBox="0 0 100 100" fill="none">

            <rect x="18" y="14" width="64" height="50" rx="10"
            stroke="#009dff" stroke-width="6"/>

            <circle cx="35" cy="39" r="10"
            stroke="#009dff" stroke-width="5"/>

            <circle cx="65" cy="39" r="10"
            stroke="#ff3636" stroke-width="5"/>

            <path d="M30 66V88"
            stroke="#009dff"
            stroke-width="6"
            stroke-linecap="round"/>

            <path d="M70 66V88"
            stroke="#ff3636"
            stroke-width="6"
            stroke-linecap="round"/>

            <path d="M50 64V86"
            stroke="#ff8c1a"
            stroke-width="6"
            stroke-linecap="round"/>

          </svg>

        </div>

        <div class="title blue">MANIFOLD</div>

      </div>

      <!-- ERROS -->
      <div class="card">

        <div class="icon red">⚠️</div>
        <div class="title red">ERROS</div>

      </div>

      <!-- TESTES -->
      <div class="card">

        <div class="icon orange">📟</div>
        <div class="title orange">TESTES</div>

      </div>

      <!-- GASES -->
      <div class="card">

        <div class="icon green">🧯</div>
        <div class="title green">GASES</div>

      </div>

      <!-- MODELOS -->
      <div class="card">

        <div class="icon blue">❄️</div>
        <div class="title blue">MODELOS</div>

      </div>

    </div>

  </div>

  <div class="nav">

    <button onclick="prev()">‹</button>
    <button onclick="next()">›</button>

  </div>

</div>

<script>

const cards=document.querySelectorAll('.card');

let current=0;

let startX=0;
let endX=0;

function updateCarousel(){

  cards.forEach((card,index)=>{

    card.className='card';

    const left=(current-1+cards.length)%cards.length;
    const right=(current+1)%cards.length;

    const farLeft=(current-2+cards.length)%cards.length;
    const farRight=(current+2)%cards.length;

    if(index===current)
      card.classList.add('center');

    else if(index===left)
      card.classList.add('left');

    else if(index===right)
      card.classList.add('right');

    else if(index===farLeft)
      card.classList.add('far-left');

    else if(index===farRight)
      card.classList.add('far-right');

    else
      card.classList.add('hidden');

  });

}

function next(){
  current=(current+1)%cards.length;
  updateCarousel();
}

function prev(){
  current=(current-1+cards.length)%cards.length;
  updateCarousel();
}

const carousel=document.getElementById('carousel');

carousel.addEventListener('touchstart',e=>{
  startX=e.touches[0].clientX;
});

carousel.addEventListener('touchend',e=>{

  endX=e.changedTouches[0].clientX;

  const diff=endX-startX;

  if(diff>45) prev();

  if(diff<-45) next();

});

updateCarousel();

</script>

</body>
</html>
