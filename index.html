<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RefriCore IA Ultra Pro</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#050505;
  color:#fff;
}

.header{
  padding:14px;
  background:#0b0b0b;
  border-bottom:1px solid #222;
}

.title{
  font-size:20px;
  font-weight:bold;
  letter-spacing:1px;
}

.subtitle{
  font-size:11px;
  color:#777;
}

.container{
  padding:12px;
  max-width:900px;
  margin:auto;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.card{
  background:#0f0f0f;
  border:1px solid #1c1c1c;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
}

.panel{
  background:#0a0a0a;
  border:1px solid #222;
  padding:12px;
  border-radius:14px;
  margin-bottom:10px;
}

input, select{
  width:100%;
  padding:10px;
  margin-top:5px;
  background:#000;
  border:1px solid #2a2a2a;
  color:#fff;
  border-radius:8px;
}

.big{
  font-size:30px;
  font-weight:bold;
}

.status{
  font-size:12px;
  padding:6px 10px;
  border-radius:20px;
  display:inline-block;
  margin-top:6px;
}

.green{background:#0c2a1a;color:#00ff9d;}
.yellow{background:#2a240c;color:#ffd000;}
.red{background:#2a0c0c;color:#ff4d4d;}

canvas{
  width:100%;
  height:180px;
  background:#000;
  border-radius:10px;
  border:1px solid #222;
}
</style>
</head>

<body>

<div class="header">
  <div class="title">REFRICORE IA ULTRA PRO</div>
  <div class="subtitle">Manifold digital com IA de diagnóstico</div>
</div>

<div class="container">

<div class="card">
<label>Gás</label>
<select id="gas" onchange="resetGraph()">
  <option value="R410A">R410A</option>
  <option value="R32">R32</option>
  <option value="R22">R22</option>
  <option value="R134a">R134a</option>
</select>
</div>

<div class="grid">

  <div class="card">
    <label>Pressão Baixa</label>
    <input id="pb" type="number" value="65" oninput="update()">
  </div>

  <div class="card">
    <label>Temperatura Sucção</label>
    <input id="ts" type="number" value="9" oninput="update()">
  </div>

</div>

<div class="panel">

  <div>Evaporação</div>
  <div class="big" id="evap">--</div>

  <div>Superaquecimento</div>
  <div class="big" id="sh">--</div>

  <div id="zone" class="status green">Zona: --</div>

</div>

<div class="panel">
<canvas id="graph"></canvas>
</div>

<div class="panel" id="diag">
Aguardando análise...
</div>

</div>

<script>

/* =========================
   BASE HVAC
========================= */

const gases = {
  R410A:[{psi:50,evap:0},{psi:60,evap:2},{psi:70,evap:4},{psi:80,evap:6},{psi:90,evap:8},{psi:100,evap:10}],
  R32:[{psi:50,evap:1},{psi:60,evap:3},{psi:70,evap:5},{psi:80,evap:7},{psi:90,evap:9},{psi:100,evap:11}],
  R22:[{psi:40,evap:0},{psi:50,evap:3},{psi:60,evap:5},{psi:70,evap:7},{psi:80,evap:9},{psi:90,evap:11}],
  R134a:[{psi:20,evap:0},{psi:30,evap:2},{psi:40,evap:4},{psi:50,evap:6},{psi:60,evap:8},{psi:70,evap:10}]
};

function evapCalc(gas, psi){
  let t = gases[gas];
  for(let i=0;i<t.length-1;i++){
    let a=t[i],b=t[i+1];
    if(psi>=a.psi && psi<=b.psi){
      let r=(psi-a.psi)/(b.psi-a.psi);
      return a.evap+r*(b.evap-a.evap);
    }
  }
  return t[t.length-1].evap;
}

/* =========================
   GRÁFICO REAL TIME
========================= */

let data = [];

function drawGraph(){

  let c = document.getElementById("graph");
  let ctx = c.getContext("2d");

  c.width = c.clientWidth;
  c.height = 180;

  ctx.clearRect(0,0,c.width,c.height);

  ctx.strokeStyle = "#00ff99";
  ctx.beginPath();

  for(let i=0;i<data.length;i++){
    let x = (i/data.length)*c.width;
    let y = c.height - (data[i]*10);
    if(i==0) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  }

  ctx.stroke();
}

/* =========================
   IA DIAGNÓSTICO
========================= */

function ia(sh){

  if(sh > 12) return {msg:"🔴 Subcarga provável / restrição", cls:"red"};
  if(sh < 3) return {msg:"🟡 Excesso de líquido", cls:"yellow"};
  if(sh >=5 && sh<=8) return {msg:"🟢 Operação ideal", cls:"green"};

  return {msg:"🟡 Fora da zona ideal", cls:"yellow"};
}

/* =========================
   UPDATE CONTÍNUO
========================= */

function update(){

  let gas=document.getElementById("gas").value;
  let pb=Number(document.getElementById("pb").value);
  let ts=Number(document.getElementById("ts").value);

  let evap=evapCalc(gas,pb);
  let sh=ts-evap;

  document.getElementById("evap").innerText=evap.toFixed(1)+" °C";
  document.getElementById("sh").innerText=sh.toFixed(1)+" K";

  let r=ia(sh);

  let zone=document.getElementById("zone");
  zone.innerText="Zona: "+r.msg;
  zone.className="status "+r.cls;

  document.getElementById("diag").innerText=r.msg;

  data.push(sh);
  if(data.length>30) data.shift();

  drawGraph();
}

function resetGraph(){
  data=[];
}

setInterval(update,800);
update();

</script>

</body>
</html>
