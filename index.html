<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RefriCore Manifold Pro</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#050505;
  color:#fff;
}

/* HEADER INDUSTRIAL */
.header{
  padding:14px;
  background:#0b0b0b;
  border-bottom:1px solid #1e1e1e;
}

.title{
  font-size:20px;
  font-weight:bold;
  letter-spacing:1px;
}

.subtitle{
  font-size:11px;
  color:#777;
}

/* LAYOUT MANIFOLD */
.container{
  padding:12px;
  max-width:900px;
  margin:auto;
}

/* INPUTS */
.card{
  background:#0f0f0f;
  border:1px solid #1c1c1c;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
}

label{
  font-size:12px;
  color:#aaa;
}

input, select{
  width:100%;
  padding:10px;
  margin-top:5px;
  background:#000;
  border:1px solid #2a2a2a;
  color:#fff;
  border-radius:8px;
}

/* PAINEL PRINCIPAL (MANIFOLD DISPLAY) */
.panel{
  background:linear-gradient(180deg,#0a0a0a,#000);
  border:1px solid #222;
  border-radius:16px;
  padding:15px;
  margin-bottom:10px;
  box-shadow:0 0 20px rgba(0,255,120,0.05);
}

/* VALORES GRANDES */
.big{
  font-size:34px;
  font-weight:bold;
  letter-spacing:1px;
}

/* GRID DISPLAY */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

/* STATUS COLORS */
.status{
  padding:6px 10px;
  border-radius:20px;
  font-size:12px;
  display:inline-block;
  margin-top:6px;
}

.green{background:#0c2a1a;color:#00ff9d;}
.yellow{background:#2a240c;color:#ffd000;}
.red{background:#2a0c0c;color:#ff4d4d;}

/* LABELS DE PAINEL */
.tag{
  font-size:11px;
  color:#888;
  margin-bottom:4px;
}

/* ALERTA */
.alert{
  padding:12px;
  border-radius:12px;
  border:1px solid #2a2a2a;
  background:#0d0d0d;
  font-size:13px;
}
</style>
</head>

<body>

<div class="header">
  <div class="title">REFRICORE MANIFOLD PRO</div>
  <div class="subtitle">Sistema inteligente de diagnóstico HVAC</div>
</div>

<div class="container">

<!-- INPUTS -->
<div class="card">
  <label>Gás Refrigerante</label>
  <select id="gas" onchange="calc()">
    <option value="R410A">R410A</option>
    <option value="R32">R32</option>
    <option value="R22">R22</option>
    <option value="R134a">R134a</option>
  </select>
</div>

<div class="grid">

  <div class="card">
    <label>Pressão Baixa (PSI)</label>
    <input id="pb" type="number" value="65" oninput="calc()">
  </div>

  <div class="card">
    <label>Temp. Sucção (°C)</label>
    <input id="ts" type="number" value="9" oninput="calc()">
  </div>

</div>

<!-- PAINEL MANIFOLD -->
<div class="panel">

  <div class="tag">EVAPORAÇÃO</div>
  <div class="big" id="evap">--</div>

  <div class="status green" id="zoneEvap">Zona: --</div>

</div>

<div class="panel">

  <div class="tag">PRESSÃO ALTA</div>
  <div class="big" id="pa">--</div>

  <div class="tag">SUPERAQUECIMENTO</div>
  <div class="big" id="sh">--</div>

</div>

<!-- DIAGNÓSTICO -->
<div class="alert" id="diag">
Aguardando leitura do sistema...
</div>

</div>

<script>

/* =========================
   TABELA HVAC PRO
========================= */

const gases = {

  R410A: [
    {psi: 50, evap: 0},
    {psi: 60, evap: 2},
    {psi: 70, evap: 4},
    {psi: 80, evap: 6},
    {psi: 90, evap: 8},
    {psi: 100, evap: 10}
  ],

  R32: [
    {psi: 50, evap: 1},
    {psi: 60, evap: 3},
    {psi: 70, evap: 5},
    {psi: 80, evap: 7},
    {psi: 90, evap: 9},
    {psi: 100, evap: 11}
  ],

  R22: [
    {psi: 40, evap: 0},
    {psi: 50, evap: 3},
    {psi: 60, evap: 5},
    {psi: 70, evap: 7},
    {psi: 80, evap: 9},
    {psi: 90, evap: 11}
  ],

  R134a: [
    {psi: 20, evap: 0},
    {psi: 30, evap: 2},
    {psi: 40, evap: 4},
    {psi: 50, evap: 6},
    {psi: 60, evap: 8},
    {psi: 70, evap: 10}
  ]
};

function evapCalc(gas, psi){

  let t = gases[gas];

  for(let i=0;i<t.length-1;i++){

    let a = t[i];
    let b = t[i+1];

    if(psi >= a.psi && psi <= b.psi){

      let r = (psi - a.psi) / (b.psi - a.psi);
      return a.evap + r * (b.evap - a.evap);
    }
  }

  return t[t.length-1].evap;
}

function calc(){

  let gas = document.getElementById("gas").value;
  let pb = Number(document.getElementById("pb").value);
  let ts = Number(document.getElementById("ts").value);

  let evap = evapCalc(gas, pb);

  let coefAlta = {
    R410A: 3.6,
    R32: 3.4,
    R22: 2.8,
    R134a: 2.5
  };

  let pa = pb * (coefAlta[gas] || 3);
  let sh = ts - evap;

  document.getElementById("evap").innerText = evap.toFixed(1) + " °C";
  document.getElementById("pa").innerText = pa.toFixed(0) + " PSI";
  document.getElementById("sh").innerText = sh.toFixed(1) + " K";

  /* ZONA DE OPERAÇÃO */
  let zone = document.getElementById("zoneEvap");

  if(sh >= 5 && sh <= 8){
    zone.innerText = "Zona: OPERANDO NORMAL";
    zone.className = "status green";
  }
  else if(sh > 10){
    zone.innerText = "Zona: SUBCARGA POSSÍVEL";
    zone.className = "status red";
  }
  else{
    zone.innerText = "Zona: ATENÇÃO NO SISTEMA";
    zone.className = "status yellow";
  }

  /* DIAGNÓSTICO */
  let diag = document.getElementById("diag");

  if(sh > 12){
    diag.innerHTML = "🔴 Diagnóstico: possível falta de gás ou restrição no sistema";
  }
  else if(sh < 3){
    diag.innerHTML = "🟡 Diagnóstico: excesso de líquido ou retorno incorreto";
  }
  else{
    diag.innerHTML = "🟢 Sistema operando dentro da faixa ideal";
  }
}

calc();

</script>

</body>
</html>
